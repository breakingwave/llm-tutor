defaults:
  primary_model: "openai/gpt-5-mini"
  fallback_model: "anthropic/claude-sonnet-4-6"
  embedding_model: "openai/text-embedding-3-small"

module_overrides:
  gathering:
    extract_hooks:
      model: "openai/gpt-5-mini"
      max_tokens: 1000
      reasoning_effort: "low"
    generate_queries:
      model: "openai/gpt-5-mini"
      max_tokens: 2000
      reasoning_effort: "low"
      response_format:
        type: json_object
    score_relevance:
      model: "openai/gpt-5-mini"
      max_tokens: 500
      reasoning_effort: "low"
      response_format:
        type: json_object
    summarize:
      model: "openai/gpt-5-mini"
      max_tokens: 1000
      reasoning_effort: "low"
  curriculum:
    analyse:
      model: "anthropic/claude-sonnet-4-6"
      max_tokens: 4000
      reasoning_effort: "low"
      response_format:
        type: json_object
    design:
      model: "anthropic/claude-sonnet-4-6"
      max_tokens: 4000
      reasoning_effort: "low"
      response_format:
        type: json_object
    develop:
      model: "openai/gpt-5-mini"
      max_tokens: 6000
      reasoning_effort: "low"
      response_format:
        type: json_object

  dialogue:
    chat:
      model: "anthropic/claude-sonnet-4-6"
      max_tokens: 2000
      stream: true
      reasoning_effort: "low"
