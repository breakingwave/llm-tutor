global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: llm_tutor_dev
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: llm_tutor_prod
    static_configs:
      - targets: ["app:8000"]
    metrics_path: /metrics
