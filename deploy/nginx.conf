# NiceGUI mounts Socket.IO at /_nicegui_ws/socket.io/ (not /socket.io/).
# Test with GET (not HEAD): curl -I uses HEAD and often gets 405 from Engine.IO.
# From the VPS host, use nginx on :80 (app :8000 is usually not mapped to the host):
#   curl -sS "http://127.0.0.1/_nicegui_ws/socket.io/?EIO=4&transport=polling" | head -c 120
# Or hit Uvicorn inside the app container: docker exec llm_tutor_app curl -sS http://127.0.0.1:8000/...
# Browsers load wss:// when the page is https:// — use TLS + X-Forwarded-Proto so the app sees HTTPS.
#
# Socket.IO / NiceGUI need WebSocket upgrade headers through the reverse proxy.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 512m;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Explicit block so operators know where NiceGUI websockets live (same headers as location /).
    location /_nicegui_ws/ {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 86400s;
        proxy_read_timeout 86400s;
        send_timeout 86400s;
        proxy_buffering off;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        send_timeout 300s;
        proxy_buffering off;
    }
}
